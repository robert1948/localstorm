name: 🔍 Simple Heroku Test

on:
  workflow_dispatch:
    inputs:
      test_deployment:
        description: 'Test Heroku deployment?'
        required: true
        default: 'NO'
        type: choice
        options:
        - 'NO'
        - 'YES'

jobs:
  test-heroku:
    runs-on: ubuntu-latest
    if: github.event.inputs.test_deployment == 'YES'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check Heroku API Key
      run: |
        if [ -z "${{ secrets.HEROKU_API_KEY }}" ]; then
          echo "❌ HEROKU_API_KEY is missing!"
          echo "Go to Settings → Secrets → Actions and add HEROKU_API_KEY"
          exit 1
        else
          echo "✅ HEROKU_API_KEY is present"
        fi
    
    - name: Test Heroku App Info
      run: |
        echo "Testing Heroku app: capecraft"
        curl -s -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}" \
             -H "Accept: application/vnd.heroku+json; version=3" \
             https://api.heroku.com/apps/capecraft || echo "Failed to get app info"
    
    - name: Simple Deploy Test
      uses: akhileshns/heroku-deploy@v3.12.14
      with:
        heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
        heroku_app_name: capecraft
        heroku_email: zeonita@gmail.com
        usedocker: true
