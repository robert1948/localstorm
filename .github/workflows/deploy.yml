name: 🚀 Deploy to Heroku (Container)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HEROKU_APP_NAME: autolocal
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}

    steps:
      - name: 🗵️ Checkout code
        uses: actions/checkout@v3

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: 🔨 Build and copy frontend
        working-directory: client
        run: npm run build

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: 🚀 Install Heroku CLI
        run: |
          curl https://cli-assets.heroku.com/install.sh | sh
          echo "$HOME/.local/share/heroku/bin" >> $GITHUB_PATH

      - name: 🔑 Login to Heroku Container Registry
        run: |
          echo $HEROKU_API_KEY | docker login --username=_ --password-stdin registry.heroku.com

      - name: 🛠️ Build Docker image
        run: docker build -t registry.heroku.com/$HEROKU_APP_NAME/web .

      - name: 📦 Push Docker image to Heroku
        run: docker push registry.heroku.com/$HEROKU_APP_NAME/web

      - name: 🎉 Release app on Heroku
        run: heroku container:release web --app $HEROKU_APP_NAME
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}

      - name: ✅ Done!
        run: echo "Deployed to https://$HEROKU_APP_NAME.herokuapp.com"
