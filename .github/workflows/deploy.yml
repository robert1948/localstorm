name: 🚀 Deploy to Heroku (Container)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HEROKU_APP_NAME: autolocal
      HEROKU_EMAIL: zeonita@gmail.com
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}

    steps:
      - name: 📅 Checkout code
        uses: actions/checkout@v3

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: 🔨 Build and copy frontend
        working-directory: client
        run: npm run build

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: 🚀 Deploy to Heroku Container Registry
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: autolocal
          heroku_email: zeonita@gmail.com
          usedocker: true

      - name: ✅ Done!
        run: echo "Deployed to https://$HEROKU_APP_NAME.herokuapp.com"
